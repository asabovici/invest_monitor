site_name: Invest Monitor
site_description: Personal investment-portfolio analytics — Streamlit dashboard, CLI, and three Claude-powered agents.
site_url: https://example.com/invest-monitor/
repo_url: https://github.com/anthropics/invest_monitor
repo_name: invest_monitor
copyright: Personal use — not investment advice

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  # Code blocks + admonitions
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Lists, tables, attributes
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  # Tabbed content
  - pymdownx.tabbed:
      alternate_style: true
  # Critical for nice tables of icons / callouts
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Dashboard:
    - Overview: dashboard.md
    - Portfolio Groups: portfolio-groups.md
    - Lookthrough: lookthrough.md
    - Income & SWR: income-and-swr.md
    - Performance Attribution: performance-attribution.md
    - Benchmarks: benchmarks.md
    - Wealth Projection: wealth-projection.md
    - Risk: risk.md
  - CLI Reference: cli.md
  - AI Agents: ai-agents.md
  - Conversation Summaries: conversation-summaries.md
  - Data Model: data-model.md
  - Production: production.md
  - Developer Guide: developer.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anthropics/invest_monitor
